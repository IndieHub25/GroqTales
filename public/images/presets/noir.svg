<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="noir-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f0f0f"/>
    </linearGradient>
    <pattern id="noise" patternUnits="userSpaceOnUse" width="100" height="100">
      <circle cx="25" cy="25" r="1" fill="#333" opacity="0.3"/>
      <circle cx="75" cy="25" r="1" fill="#333" opacity="0.2"/>
      <circle cx="25" cy="75" r="1" fill="#333" opacity="0.25"/>
      <circle cx="75" cy="75" r="1" fill="#333" opacity="0.3"/>
    </pattern>
  </defs>
  <rect fill="url(#noir-grad)" width="400" height="300"/>
  <rect fill="url(#noise)" width="400" height="300"/>
  <circle cx="320" cy="80" r="40" fill="#e94560" opacity="0.6"/>
  <rect x="60" y="180" width="120" height="80" fill="#0f0f0f" opacity="0.5"/>
  <line x1="60" y1="260" x2="180" y2="260" stroke="#e94560" stroke-width="3"/>
  <text x="200" y="160" font-family="serif" font-size="48" fill="#f5f5f5" text-anchor="middle" opacity="0.8">🔍</text>
</svg>
