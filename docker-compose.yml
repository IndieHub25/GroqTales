# GroqTales / Comicraft — Docker Compose
# v2.0.0 — Supabase-backed, Ethereum Mainnet via Alchemy
#
# Usage:
#   cp .env.example .env.local
#   # Fill in all required env vars
#   docker compose up --build
#
# The app connects to external managed services:
#   - Supabase (PostgreSQL + Auth + Storage)
#   - Alchemy (Ethereum RPC)
#   - Groq / Gemini AI
#   - Sarvam TTS
#   - Redis (Render-managed or local)

services:
  # ---------------------------------------------------------------------------
  # Redis — local cache (optional; production uses Render Redis)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # GroqTales App — Next.js frontend + Express backend
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379

      # ── Supabase (required) ──
      # NEXT_PUBLIC_SUPABASE_URL: (set in .env.local)
      # NEXT_PUBLIC_SUPABASE_ANON_KEY: (set in .env.local)
      # SUPABASE_SERVICE_ROLE_KEY: (set in .env.local)

      # ── AI Services (required) ──
      # GEMINI_API_KEY: (set in .env.local)
      # GROQ_API_KEY: (set in .env.local)

      # ── Blockchain (required for NFT minting) ──
      # ALCHEMY_ETH_MAINNET_HTTP_URL: (set in .env.local)
      # PLATFORM_SIGNER_KEY: (set in .env.local)

      # ── WalletConnect (optional) ──
      # NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: (set in .env.local)

      # ── TTS (optional) ──
      # SARVAM_API_KEY: (set in .env.local)
    ports:
      - "3000:3000"
      - "3001:3001"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3001/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  redis_data:
